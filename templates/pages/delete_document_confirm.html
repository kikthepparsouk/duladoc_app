{% extends "base.html" %}

{% block title %}Delete Document - Duladoc{% endblock %}

{% block content %}
<main class="container" style="max-width: 720px; padding: 60px 16px;">
    <section style="background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 28px;">
        <h1 style="font-size: 24px; margin-bottom: 12px;">Delete document?</h1>
        <p style="color: #666; margin-bottom: 20px;">
            This will remove "{{ doc.title }}" from your documents. This action cannot be undone.
        </p>

        <form method="post" style="display: flex; gap: 12px; flex-wrap: wrap;">
            {% csrf_token %}
            <button type="submit" class="btn" style="background: #dc3545; color: #fff; border-radius: 4px; padding: 10px 18px;">
                Delete
            </button>
            <a href="{% url 'my-documents' %}" class="btn" style="background: #f2f2f2; color: #333; border-radius: 4px; padding: 10px 18px;">
                Cancel
            </a>
        </form>
    </section>
</main>
{% endblock %}
